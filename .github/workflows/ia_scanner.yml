name: IA Scanner

on:
  pull_request:
  push:
    branches: [ main, feat/** ]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci || true
      - name: Run IA scanner
        run: node tools/ia_scanner.js
